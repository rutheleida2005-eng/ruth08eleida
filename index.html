<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner QR Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">

    <header class="bg-slate-800 shadow-md p-4 text-center border-b border-slate-700">
        <h1 class="text-xl font-bold tracking-wide text-emerald-400 flex justify-center items-center gap-2">
            📷 Lector QR Móvil
        </h1>
    </header>

    <main class="flex-1 max-w-md w-full mx-auto p-4 space-y-6 flex flex-col justify-between">
        
        <div class="space-y-3">
            <div class="relative bg-slate-950 rounded-2xl overflow-hidden border-2 border-slate-700 shadow-inner min-h-[280px] flex flex-col items-center justify-center">
                <div id="reader" class="w-full h-full"></div>
                
                <div id="placeholder-text" class="absolute text-center p-6 text-slate-400 space-y-2">
                    <span class="text-4xl block">📷</span>
                    <p class="text-sm font-medium">La cámara está apagada</p>
                    <p class="text-xs text-slate-500">Presiona el botón de abajo para escanear</p>
                </div>
            </div>

            <div class="flex gap-2">
                <button id="btn-toggle" onclick="controlarCamara()" class="flex-1 bg-emerald-500 hover:bg-emerald-600 active:scale-98 text-slate-950 font-bold py-3.5 px-4 rounded-xl transition duration-200 shadow-lg cursor-pointer text-center text-base">
                    🔋 Activar Cámara
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col min-h-[250px] mt-2">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Datos Reconocidos</h2>
                <button onclick="limpiarHistorial()" class="text-xs font-semibold text-rose-400 hover:text-rose-300 cursor-pointer transition">
                    🗑️ Limpiar todo
                </button>
            </div>

            <div class="flex-1 bg-slate-800/50 border border-slate-700 rounded-xl p-3 overflow-y-auto max-h-[300px] space-y-2.5 shadow-inner" id="lista-registros">
                <p id="sin-registros" class="text-sm text-slate-500 text-center py-8 italic">No hay códigos escaneados aún.</p>
            </div>
        </div>
    </main>

    <footer class="text-center p-3 text-xs text-slate-500 border-t border-slate-800 bg-slate-950/30">
        Almacenamiento local activo (Persistente)
    </footer>

    <script>
        let html5QrCode = null;
        let camaraActiva = false;
        let registros = [];

        // Al cargar la página, recuperamos los datos guardados previamente en el celular
        document.addEventListener("DOMContentLoaded", () => {
            const guardados = localStorage.getItem("qr_registros");
            if (guardados) {
                registros = JSON.parse(guardados);
                renderizarHistorial();
            }
        });

        // Función principal del botón: Enciende o apaga la cámara
        function controlarCamara() {
            const btn = document.getElementById("btn-toggle");
            const placeholder = document.getElementById("placeholder-text");

            if (!camaraActiva) {
                // Instanciamos el lector en el div #reader
                html5QrCode = new Html5Qrcode("reader");
                placeholder.classList.add("hidden");

                // Configuración óptima para enfoque móvil
                const config = { 
                    fps: 15, 
                    qrbox: (width, height) => {
                        const size = Math.min(width, height) * 0.65;
                        return { width: size, height: size };
                    }
                };

                // 'facingMode: environment' fuerza el uso de la cámara trasera del smartphone
                html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    onQrSuccess, 
                    onQrError
                )
                .then(() => {
                    camaraActiva = true;
                    btn.innerText = "🛑 Detener Cámara";
                    btn.classList.replace("bg-emerald-500", "bg-rose-500");
                    btn.classList.replace("hover:bg-emerald-600", "hover:bg-rose-600");
                    btn.classList.replace("text-slate-950", "text-white");
                })
                .catch(err => {
                    console.error("Error al abrir cámara:", err);
                    placeholder.classList.remove("hidden");
                    alert("No se pudo acceder a la cámara. Asegúrate de otorgar los permisos necesarios en el navegador.");
                });
            } else {
                apagarCamara();
            }
        }

        // Se ejecuta automáticamente al reconocer con éxito un QR
        function onQrSuccess(decodedText, decodedResult) {
            // Generar fecha y hora actual detallada
            const ahora = new Date();
            const fecha = ahora.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const hora = ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            // Añadir al inicio del arreglo
            registros.unshift({
                texto: decodedText,
                fecha: fecha,
                hora: hora
            });

            // Guardar de forma persistente en el dispositivo
            localStorage.setItem("qr_registros", JSON.stringify(registros));
            
            // Vibración sutil de confirmación (si el dispositivo lo soporta)
            if (navigator.vibrate) navigator.vibrate(150);

            renderizarHistorial();
            apagarCamara(); // Apagamos la cámara tras una lectura exitosa para ahorrar batería
        }

        // Captura errores de enfoque continuos (silenciado para no saturar la pantalla)
        function onQrError(errorMessage) {
            // El escáner busca activamente en cada fotograma, los errores de no-detección se ignoran.
        }

        // Apaga el flujo de video de la cámara de forma limpia
        function apagarCamara() {
            const btn = document.getElementById("btn-toggle");
            const placeholder = document.getElementById("placeholder-text");

            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById("reader").innerHTML = "";
                    placeholder.classList.remove("hidden");
                    camaraActiva = false;

                    // Restaurar estilos del botón original
                    btn.innerText = "🔋 Activar Cámara";
                    btn.classList.replace("bg-rose-500", "bg-emerald-500");
                    btn.classList.replace("hover:bg-rose-600", "hover:bg-emerald-600");
                    btn.classList.replace("text-white", "text-slate-950");
                }).catch(err => console.error("Error al detener cámara:", err));
            }
        }

        // Actualiza la interfaz de la lista de registros escaneados
        function renderizarHistorial() {
            const contenedor = document.getElementById("lista-registros");
            const vacioText = document.getElementById("sin-registros");

            if (registros.length === 0) {
                contenedor.innerHTML = '';
                contenedor.appendChild(vacioText);
                return;
            }

            contenedor.innerHTML = registros.map(reg => `
                <div class="bg-slate-800 border-l-4 border-emerald-400 p-3 rounded-r-xl space-y-1 shadow">
                    <div class="flex justify-between items-center text-[11px] text-slate-400 font-mono">
                        <span>📅 ${reg.fecha}</span>
                        <span>⏱️ ${reg.hora}</span>
                    </div>
                    <p class="text-sm text-slate-200 font-medium break-all selection:bg-emerald-500 selection:text-slate-950">${escaparHTML(reg.texto)}</p>
                </div>
            `).join('');
        }

        // Vacía el historial del LocalStorage
        function limpiarHistorial() {
            if (confirm("¿Estás seguro de que deseas eliminar todos los registros guardados?")) {
                registros = [];
                localStorage.removeItem("qr_registros");
                renderizarHistorial();
            }
        }

        // Seguridad elemental contra inyecciones de código malicioso en los textos del QR
        function escaparHTML(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
