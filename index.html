<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner QR Pro</title>
    <script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-top: 0;
            color: #0f172a;
        }

        .camera-box {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 20px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn.active {
            background-color: #dc2626;
        }

        .btn.active:hover {
            background-color: #b91c1c;
        }

        .history-section {
            border-top: 2px solid var(--border);
            padding-top: 20px;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .list-container {
            max-height: 250px;
            overflow-y: auto;
        }

        .scan-item {
            background: var(--background);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .scan-item .date {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 4px;
            display: block;
        }

        .scan-item .data {
            word-break: break-all;
            font-weight: 500;
        }
        
        .no-data {
            text-align: center;
            color: #64748b;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Escáner de Códigos QR</h1>
    
    <div class="camera-box">
        <video id="preview"></video>
    </div>

    <button id="btn-toggle" class="btn">Activar Cámara</button>

    <div class="history-section">
        <h2>Historial de Registros</h2>
        <div id="history-list" class="list-container">
            <p class="no-data">No hay códigos escaneados aún.</p>
        </div>
    </div>
</div>

<script>
    let scanner = null;
    let isCameraActive = false;
    const btnToggle = document.getElementById('btn-toggle');
    const historyList = document.getElementById('history-list');

    // Inicializar el escáner de Instascan
    function initScanner() {
        scanner = new Instascan.Scanner({ 
            video: document.getElementById('preview'),
            mirror: false // Desactiva el modo espejo para leer bien el texto del QR
        });

        // Evento que se dispara al detectar un código QR
        scanner.addListener('scan', function (content) {
            saveQRCode(content);
            // Efecto de sonido o vibración opcional si el móvil lo permite
            if (navigator.vibrate) navigator.vibrate(200);
        });
    }

    // Función para encender o apagar la cámara
    async function toggleCamera() {
        if (!scanner) initScanner();

        if (isCameraActive) {
            // Apagar cámara
            Instascan.Camera.getCameras().then(function () {
                scanner.stop();
            });
            btnToggle.textContent = "Activar Cámara";
            btnToggle.classList.remove('active');
            isCameraActive = false;
        } else {
            // Encender cámara
            try {
                const cameras = await Instascan.Camera.getCameras();
                if (cameras.length > 0) {
                    // Selecciona la cámara trasera si está disponible (ideal para móviles)
                    let selectedCamera = cameras[0];
                    for (let cam of cameras) {
                        if (cam.name.toLowerCase().includes('back') || cam.name.toLowerCase().includes('trasera')) {
                            selectedCamera = cam;
                            break;
                        }
                    }
                    
                    await scanner.start(selectedCamera);
                    btnToggle.textContent = "Apagar Cámara";
                    btnToggle.classList.add('active');
                    isCameraActive = true;
                } else {
                    alert('No se encontraron cámaras en este dispositivo.');
                }
            } catch (error) {
                console.error(error);
                alert('Error al acceder a la cámara. Asegúrate de dar los permisos necesarios.');
            }
        }
    }

    // Función para guardar los datos con fecha y hora
    function saveQRCode(data) {
        const now = new Date();
        const dateTimeString = now.toLocaleDateString() + ' a las ' + now.toLocaleTimeString();

        // Crear objeto del registro
        const record = {
            data: data,
            timestamp: dateTimeString
        };

        // Guardar en LocalStorage para que no se borre al recargar la página
        let history = JSON.parse(localStorage.getItem('qr_history')) || [];
        history.unshift(record); // Agregar al inicio de la lista
        localStorage.setItem('qr_history', JSON.stringify(history));

        // Renderizar el historial actualizado
        renderHistory();
    }

    // Función para mostrar el historial en pantalla
    function renderHistory() {
        let history = JSON.parse(localStorage.getItem('qr_history')) || [];
        
        if (history.length === 0) {
            historyList.innerHTML = '<p class="no-data">No hay códigos escaneados aún.</p>';
            return;
        }

        historyList.innerHTML = ''; // Limpiar contenedor
        history.forEach(item => {
            const div = document.createElement('div');
            div.className = 'scan-item';
            div.innerHTML = `
                <span class="date">📅 ${item.timestamp}</span>
                <div class="data">${escapeHtml(item.data)}</div>
            `;
            historyList.appendChild(div);
        });
    }

    // Función de seguridad para evitar inyección de código en el texto escaneado
    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    // Escuchar el clic del botón
    btnToggle.addEventListener('click', toggleCamera);

    // Cargar historial guardado al abrir la página
    document.addEventListener('DOMContentLoaded', renderHistory);
</script>

</body>
</html>
