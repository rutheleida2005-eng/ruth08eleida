<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Personal y Asistencia</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <div class="flex h-screen overflow-hidden">
        <div class="w-64 bg-slate-900 text-white p-6 flex flex-col justify-between">
            <div>
                <h1 class="text-2xl font-bold mb-8 text-center text-indigo-400">RR.HH. Panel</h1>
                <nav class="space-y-2">
                    <button onclick="switchTab('trabajadores')" id="btn-trabajadores" class="w-full text-left py-2.5 px-4 rounded bg-indigo-600 font-medium transition-colors">
                        👤 Trabajadores
                    </button>
                    <button onclick="switchTab('asistencia')" id="btn-asistencia" class="w-full text-left py-2.5 px-4 rounded hover:bg-slate-800 font-medium transition-colors">
                        📅 Asistencia y QR
                    </button>
                </nav>
            </div>
            <div class="space-y-2">
                <button onclick="exportarBackup()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2 px-4 rounded text-sm font-semibold transition-colors">
                    📥 Exportar Backup (JS)
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white shadow px-8 py-4 flex justify-between items-center">
                <h2 id="page-title" class="text-xl font-semibold text-gray-700">Gestión de Trabajadores</h2>
                <span class="text-sm bg-slate-200 text-slate-700 px-3 py-1 rounded-full font-mono" id="live-clock"></span>
            </header>

            <main class="p-8 flex-1">
                <section id="sec-trabajadores" class="block">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-medium text-gray-600">Personal Registrado</h3>
                        <button onclick="formTrabajador()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded font-semibold shadow transition-colors">
                            + Nuevo Trabajador
                        </button>
                    </div>
                    <div class="bg-white rounded-xl shadow overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b border-gray-200 text-gray-600 text-sm uppercase font-semibold">
                                    <th class="p-4">DNI</th>
                                    <th class="p-4">Apellidos y Nombres</th>
                                    <th class="p-4">Género</th>
                                    <th class="p-4">Edad</th>
                                    <th class="p-4">Teléfono</th>
                                    <th class="p-4">Área</th>
                                    <th class="p-4 text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-trabajadores" class="divide-y divide-gray-100 text-sm">
                                </tbody>
                        </table>
                    </div>
                </section>

                <section id="sec-asistencia" class="hidden space-y-6">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-xl shadow flex flex-col items-center">
                            <h3 class="text-lg font-medium text-gray-700 mb-4 text-center">📷 Escáner QR de Asistencia</h3>
                            <div id="reader" class="w-full bg-black rounded-lg overflow-hidden" style="max-width: 350px;"></div>
                            <div class="mt-4 flex gap-2">
                                <button onclick="inicializarEscaner()" class="bg-indigo-600 text-white px-4 py-2 rounded text-sm font-semibold">Encender Cámara</button>
                                <button onclick="detenerEscaner()" class="bg-rose-600 text-white px-4 py-2 rounded text-sm font-semibold">Apagar</button>
                            </div>
                        </div>

                        <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-medium text-gray-700">🗓️ Registro de Asistencias Diarias</h3>
                                <button onclick="formAsistenciaManual()" class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded text-sm font-semibold">
                                    + Registro Manual
                                </button>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse text-sm">
                                    <thead>
                                        <tr class="bg-slate-50 border-b border-gray-200 text-gray-600 font-semibold">
                                            <th class="p-3">Fecha / Hora</th>
                                            <th class="p-3">Trabajador</th>
                                            <th class="p-3">Estado</th>
                                            <th class="p-3 text-center">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabla-asistencias" class="divide-y divide-gray-100">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
